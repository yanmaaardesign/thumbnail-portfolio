<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">YANMAR DESIGN OGP</title>
  <desc id="desc">やんまーのサムネイルポートフォリオ用OGP画像</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#dfe9f7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="490" rx="32" fill="#ffffff" stroke="#d6ddea"/>
  <text x="120" y="220" fill="#163b72" font-size="32" font-family="Arial, sans-serif" letter-spacing="8">YANMAR DESIGN</text>
  <text x="120" y="320" fill="#162033" font-size="64" font-family="Arial, sans-serif" font-weight="700">サムネイル・デザイン</text>
  <text x="120" y="400" fill="#162033" font-size="64" font-family="Arial, sans-serif" font-weight="700">ポートフォリオ</text>
  <text x="120" y="485" fill="#5f6b80" font-size="28" font-family="Arial, sans-serif">視認性と伝わりやすさを重視した制作事例を掲載</text>
</svg>
